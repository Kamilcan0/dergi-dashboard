function initTrendCharts(){
  var elT=document.getElementById('c_trend'),elC=document.getElementById('c_chg');

  var t=D.trend||[];
  if(!t.length)return;
  var yrs=t.map(function(d){return d.y}),prods=t.map(function(d){return d.p});
  var actual=prods.map(function(v,i){return t[i].f?null:v});
  var forecast=prods.map(function(v,i){
    if(t[i].f)return v;
    if(!t[i].f && i<prods.length-1 && t[i+1].f)return v;
    return null;
  });

  dc('c_trend');
  var ctx=elT.getContext('2d');
  if(!ctx)return;
  var g1=ctx.createLinearGradient(0,0,0,300);g1.addColorStop(0,'rgba(59,130,246,.18)');g1.addColorStop(1,'rgba(59,130,246,.01)');

  CI['c_trend']=new Chart(ctx,{

          label:function(ctx){var v=tipV(ctx);return v!=null?ctx.dataset.label+': '+ff(v):''},

          formatter:function(v){return v?fmt(v):''},

        }
      },
      scales:{
        x:{ticks:{color:'#7a8baa'},grid:{color:'rgba(30,45,74,.3)'}},
        y:{ticks:{color:'#7a8baa',callback:function(v){return fmt(v)}},grid:{color:'rgba(30,45,74,.3)'}}
      }
    }
  });

  var changes=t.slice(1).map(function(d){return d.c?(d.c*100):0});
  dc('c_chg');
  CI['c_chg']=new Chart(elC,{
    type:'bar',
    data:{labels:yrs.slice(1),datasets:[{
      label:'Değişim',data:changes,
      backgroundColor:changes.map(function(c){return c<-30?'rgba(239,68,68,.8)':c<0?'rgba(239,68,68,.5)':'rgba(34,197,94,.6)'}),
      borderRadius:4
    }]},
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'rgba(21,29,48,.95)',callbacks:{label:function(ctx){var v=tipV(ctx);return v!=null?'%'+Number(v).toFixed(1):''}}},
        datalabels:{color:'#e2e8f0',
          anchor:function(ctx){var x=dv(ctx);return(typeof x==='number'&&x<0)?'start':'end'},
          align:function(ctx){var x=dv(ctx);return(typeof x==='number'&&x<0)?'bottom':'top'},
          offset:4,font:{size:10,weight:'700'},formatter:function(v){return dlPct(v)}}
      },
      scales:{
        x:{ticks:{color:'#7a8baa'},grid:{display:false}},
        y:{ticks:{color:'#7a8baa',callback:function(v){return'%'+v}},grid:{color:'rgba(30,45,74,.3)'}}

  });

  // Matrix
  var m=D.matrix||[],yy=[2019,2020,2021,2022,2023,2024,2025,2026,2027];

    h+='<tr><th>'+yy[i]+'</th>';

function buildMagazines(){
  return '<div class="fb"><input class="fi" id="mSrch" placeholder="Dergi adı ara..." oninput="doFilterMags()">'
    +'<select class="fs" id="mSort" onchange="doFilterMags()"><option value="nd">Net Sevk (Azalan)</option><option value="na">Net Sevk (Artan)</option><option value="sd">Toplam Sevk (Azalan)</option><option value="bd">Başarı (Azalan)</option><option value="az">İsim (A-Z)</option></select>'
    +'<span class="fc" id="mCnt">90 dergi</span></div>'
    +'<div class="mg" id="mList"></div><div id="mDetail"></div>';
}

window.doFilterMags=function(){
  var q=(document.getElementById('mSrch').value||'').toLowerCase();
  var sort=document.getElementById('mSort').value;
  var arr=Object.entries(D.mags).map(function(e){return{nm:e[0],ts:e[1].ts,ti:e[1].ti,tn:e[1].tn,bo:e[1].bo,y:e[1].y}});
  if(q)arr=arr.filter(function(m){return m.nm.toLowerCase().indexOf(q)>=0});
  switch(sort){
    case'nd':arr.sort(function(a,b){return(b.tn||0)-(a.tn||0)});break;
    case'na':arr.sort(function(a,b){return(a.tn||0)-(b.tn||0)});break;
    case'sd':arr.sort(function(a,b){return(b.ts||0)-(a.ts||0)});break;
    case'bd':arr.sort(function(a,b){return(b.bo||0)-(a.bo||0)});break;
    case'az':arr.sort(function(a,b){return a.nm.localeCompare(b.nm,'tr')});break;
  }
  document.getElementById('mCnt').textContent=arr.length+' dergi';
  document.getElementById('mList').innerHTML=arr.map(function(m){
    var yrs=Object.keys(m.y).map(Number).sort();
    var nv=yrs.map(function(yr){return m.y[yr].n});
    var cl=bc(m.bo);
    var spk=spark(nv,85,26,cl==='bd-ok'?'#22c55e':cl==='bd-w'?'#f59e0b':'#ef4444');
    return'<div class="mc" onclick="showMag(\''+esc(m.nm)+'\')">'
      +'<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600;font-size:.88rem">'+m.nm+'</span><span class="bd '+cl+'">'+pct(m.bo)+'</span></div>'
      +'<div style="display:flex;gap:.7rem;margin-top:.35rem;font-size:.75rem;color:var(--dim)"><span>Sevk: <b style="color:var(--text)">'+fmt(m.ts)+'</b></span><span>Net: <b style="color:var(--accent)">'+fmt(m.tn)+'</b></span></div>'
      +'<div style="margin-top:.4rem;height:26px">'+spk+'</div></div>';
  }).join('');
};

var _curMag=null,_magPaintGen=0;

function magRow(d,yr){
  if(!d||!d.y)return null;
  var s=String(yr);
  if(d.y[s]!=null)return d.y[s];
  if(d.y[yr]!=null)return d.y[yr];
  return null;
}

window.closeMagDetail=function(){dc('c_mbar');dc('c_mline');_curMag=null;var p=document.getElementById('mDetail');if(p)p.innerHTML=''};

      {label:'İade',data:iades,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.06)',fill:true,tension:.35,pointRadius:5,pointHoverRadius:8,pointBackgroundColor:'#ef4444',pointBorderColor:'#ef4444',pointBorderWidth:2,borderWidth:2,borderDash:[6,3]}
    ]},
    options:{responsive:true,
      interaction:{mode:'index',intersect:false},

        tooltip:{backgroundColor:'rgba(21,29,48,.95)',callbacks:{label:function(ctx){var v=tipV(ctx);return ctx.dataset.label+': '+ff(v)}}},
        datalabels:{display:function(ctx){return ctx.datasetIndex===0},color:'#94a3b8',anchor:'end',align:'top',offset:4,font:{size:9,weight:'600'},formatter:function(v){return fmt(v)}}
      },
      scales:{x:{ticks:{color:'#7a8baa'},grid:{color:'rgba(30,45,74,.2)'}},y:{ticks:{color:'#7a8baa',callback:function(v){return fmt(v)}},grid:{color:'rgba(30,45,74,.3)'}}}

    }]},

        tooltip:{backgroundColor:'rgba(21,29,48,.95)',callbacks:{label:function(ctx){var v=tipV(ctx);return v!=null?'%'+Number(v).toFixed(1):'-'}}},
        datalabels:{
          color:function(ctx){var v=dv(ctx);if(v==null||typeof v!=='number'||!isFinite(v))return'transparent';if(v>=65)return'#22c55e';if(v>=50)return'#f59e0b';return'#ef4444'},
          anchor:'end',align:'top',offset:5,font:{size:9,weight:'700'},

function scheduleMagCharts(yrs,nets,iades,bdata,bcolors,attempt,gen){
  if(gen!==_magPaintGen)return;
  attempt=attempt||0;
  var barEl=document.getElementById('c_mbar'),lineEl=document.getElementById('c_mline');
  if(!barEl||!lineEl){
    if(attempt<24)setTimeout(function(){scheduleMagCharts(yrs,nets,iades,bdata,bcolors,attempt+1,gen)},45);
    return;
  }
  var r=barEl.getBoundingClientRect();
  if((r.width<8||r.height<8)&&attempt<24){
    setTimeout(function(){scheduleMagCharts(yrs,nets,iades,bdata,bcolors,attempt+1,gen)},45);
    return;
  }
  if(gen!==_magPaintGen)return;
  paintMagCharts(yrs,nets,iades,bdata,bcolors);
}

window.onMagYearChange=function(){
  requestAnimationFrame(function(){updateMagRange()});
};

window.updateMagRange=function(){
  var name=_curMag;
  var d=D.mags[name];if(!d)return;
  _magPaintGen++;
  var gen=_magPaintGen;
  var elS=document.getElementById('mdYrStart'),elE=document.getElementById('mdYrEnd');
  if(!elS||!elE)return;
  var allYrs=Object.keys(d.y).map(Number).sort();
  var y1=Number(elS.value),y2=Number(elE.value);
  if(!isFinite(y1)||!isFinite(y2))return;
  if(y2<y1){y2=y1;elE.value=String(y2)}

  var yrs=allYrs.filter(function(y){return y>=y1&&y<=y2&&magRow(d,y)});
  if(yrs.length===0)return;
  var ep=document.getElementById('mdPeriod'),es=document.getElementById('mdStats');
  if(!ep||!es)return;

  var nets=[],iades=[],sevks=[],bdata=[];
  for(var ix=0;ix<yrs.length;ix++){
    var row=magRow(d,yrs[ix]);
    if(!row)continue;
    nets.push(row.n);iades.push(row.i);sevks.push(row.s);
    var b=row.b;bdata.push((typeof b==='number'&&isFinite(b))?b*100:null);
  }
  if(!nets.length)return;

  var tSevk=sevks.reduce(function(a,b){return a+(b||0)},0);
  var tIade=iades.reduce(function(a,b){return a+(b||0)},0);
  var tNet=nets.reduce(function(a,b){return a+(b||0)},0);
  var avgBo=tSevk>0?tNet/tSevk:0;
  var validNets=nets.filter(function(v){return v!=null&&isFinite(v)});
  var peak=validNets.length?Math.max.apply(null,validNets):0;
  var peakYr=yrs[nets.indexOf(peak)]||'-';
  var first=nets[0]||1,last=nets[nets.length-1]||0;
  var chg=Math.abs(first)>0?((last-first)/Math.abs(first)*100).toFixed(0):'0';

  ep.textContent=yrs[0]+' \u2013 '+yrs[yrs.length-1]+' dönemi ('+yrs.length+' yıl)';

  es.innerHTML=
    '<div class="sc"><div class="sl">Toplam Sevk</div><div class="sv" style="color:var(--accent3)">'+ff(tSevk)+'</div></div>'
    +'<div class="sc"><div class="sl">Toplam İade</div><div class="sv" style="color:var(--accent5)">'+ff(tIade)+'</div></div>'
    +'<div class="sc"><div class="sl">Net Sevk</div><div class="sv" style="color:var(--accent)">'+ff(tNet)+'</div></div>'
    +'<div class="sc"><div class="sl">Başarı</div><div class="sv"><span class="bd '+bc(avgBo)+'" style="font-size:.85rem">'+pct(avgBo)+'</span></div></div>'
    +'<div class="sc"><div class="sl">Zirve</div><div class="sv" style="color:var(--accent4)">'+ff(peak)+' <span style="font-size:.65rem;color:var(--dim)">('+peakYr+')</span></div></div>'
    +'<div class="sc"><div class="sl">Değişim</div><div class="sv"><span class="'+(Number(chg)>=0?'up':'dn')+'">'+chg+'%</span></div></div>';

  var bcolors=bdata.map(function(v){
    if(v==null||typeof v!=='number'||!isFinite(v))return'transparent';
    if(v>=65)return'#22c55e';if(v>=50)return'#f59e0b';return'#ef4444';
  });

  scheduleMagCharts(yrs,nets,iades,bdata,bcolors,0,gen);
};

function initCompare(){
  var top3=D.t10.slice(0,3).map(function(d){return d.nm});

    var sel=document.getElementById(id);

window.doCompare=function(){
  var sel=['cm1','cm2','cm3','cm4','cm5'].map(function(id){return document.getElementById(id).value}).filter(Boolean);
  if(!sel.length){
    dc('c_cmpMain');dc('c_cmpBar');
    var ti=document.getElementById('cmpTitle'),tb=document.getElementById('cmpTbl');
    if(ti)ti.textContent='Karşılaştırma';
    if(tb)tb.innerHTML='<p style="color:var(--dim);padding:1rem;font-size:.85rem">Karşılaştırmak için en az bir dergi seçin.</p>';
    return;
  }
  var allY=new Set();
  sel.forEach(function(n){Object.keys(D.mags[n]&&D.mags[n].y||{}).forEach(function(y){allY.add(Number(y))})});
  var yrs=Array.from(allY).sort();
  var ml={net:'Net Sevk',sevk:'Toplam Sevk',iade:'İade',basari:'Başarı Oranı (%)'};
  document.getElementById('cmpTitle').textContent=ml[cmpMetric]+' Karşılaştırma';
  var gd=function(name,yr){
    var yd=D.mags[name]&&D.mags[name].y[yr];if(!yd)return null;
    if(cmpMetric==='basari'){var b=yd.b;return(typeof b==='number'&&isFinite(b))?b*100:null}
    if(cmpMetric==='sevk')return yd.s;if(cmpMetric==='iade')return yd.i;return yd.n;
  };
  var cM=document.getElementById('c_cmpMain'),cB=document.getElementById('c_cmpBar');
  if(!cM||!cB)return;
  dc('c_cmpMain');
  CI['c_cmpMain']=new Chart(cM,{
    type:'line',data:{labels:yrs,datasets:sel.map(function(name,i){
      return{label:name,data:yrs.map(function(y){return gd(name,y)}),borderColor:C[i],tension:.35,pointRadius:5,pointHoverRadius:7,borderWidth:2.5,spanGaps:true}
    })},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#94a3b8',usePointStyle:true,padding:10}},
        tooltip:{backgroundColor:'rgba(21,29,48,.95)',callbacks:{label:function(ctx){var v=tipV(ctx);return v!=null?ctx.dataset.label+': '+(cmpMetric==='basari'?'%'+Number(v).toFixed(1):ff(v)):''}}},
        datalabels:{display:false}},
      scales:{x:{ticks:{color:'#7a8baa'},grid:{color:'rgba(30,45,74,.3)'}},
        y:{ticks:{color:'#7a8baa',callback:function(v){return cmpMetric==='basari'?'%'+v:fmt(v)}},grid:{color:'rgba(30,45,74,.3)'},
          min:cmpMetric==='basari'?0:undefined,max:cmpMetric==='basari'?100:undefined}}
    }
  });

  var km={net:'tn',sevk:'ts',iade:'ti',basari:'bo'};
  var smry=sel.map(function(n){var v=D.mags[n]&&D.mags[n][km[cmpMetric]]||0;return cmpMetric==='basari'?v*100:v});
  dc('c_cmpBar');
  CI['c_cmpBar']=new Chart(cB,{
    type:'bar',data:{labels:sel,datasets:[{label:ml[cmpMetric],data:smry,backgroundColor:sel.map(function(_,i){return C[i]+'cc'}),borderRadius:5}]},
    options:{indexAxis:'y',responsive:true,
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:'rgba(21,29,48,.95)',callbacks:{label:function(ctx){var v=tipV(ctx);return v==null?'':(cmpMetric==='basari'?'%'+Number(v).toFixed(1):ff(v))}}},
        datalabels:{color:'#e2e8f0',anchor:'end',align:'start',offset:8,font:{size:10,weight:'700'},formatter:function(v){return cmpMetric==='basari'?dlPct(v):fmt(v)}}
      },
      scales:{x:{ticks:{color:'#7a8baa',callback:function(v){return cmpMetric==='basari'?'%'+v:fmt(v)}},grid:{color:'rgba(30,45,74,.3)'}},
        y:{ticks:{color:'#cbd5e1',font:{size:10,weight:'500'}},grid:{display:false}}}
    }
  });

  var th='<table class="dt"><thead><tr><th>Dergi</th>';
  yrs.forEach(function(y){th+='<th>'+y+'</th>'});
  th+='<th>Toplam</th></tr></thead><tbody>';
  sel.forEach(function(name,i){
    th+='<tr><td style="color:'+C[i]+';font-weight:600">'+name+'</td>';
    yrs.forEach(function(y){var v=gd(name,y);th+='<td>'+(v!=null?(cmpMetric==='basari'?'%'+v.toFixed(1):ff(v)):'-')+'</td>'});
    var tot=D.mags[name]&&D.mags[name][km[cmpMetric]]||0;
    th+='<td style="font-weight:700;color:var(--accent)">'+(cmpMetric==='basari'?'%'+(tot*100).toFixed(1):ff(tot))+'</td></tr>';
  });
  th+='</tbody></table>';
  document.getElementById('cmpTbl').innerHTML=th;
  flushCharts();
};

// ══════ TABLE ══════
var tCol=4,tDir='desc';
function buildTable(){
  return '<div class="fb"><input class="fi" id="tSrch" placeholder="Tabloda ara..." oninput="doFilterTable()">'
    +'<select class="fs" id="tYr" onchange="doFilterTable()"><option value="all">Tüm Yıllar (Toplam)</option>'
    +'<option value="2019">2019</option><option value="2020">2020</option><option value="2021">2021</option><option value="2022">2022</option><option value="2023">2023</option><option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026 (Tahmin)</option><option value="2027">2027 (Tahmin)</option></select>'
    +'<span class="fc" id="tCnt">90</span>'
    +'<button class="xb" onclick="exportCSV()">\u{1F4E5} CSV</button></div>'
    +'<div class="cb" style="overflow-x:auto;max-height:72vh;overflow-y:auto;padding:0">'
    +'<table class="dt" id="tbl"><thead><tr>'
    +'<th data-c="0" onclick="tSort(0)">#</th><th data-c="1" onclick="tSort(1)">Dergi</th><th data-c="2" onclick="tSort(2)">Toplam Sevk</th><th data-c="3" onclick="tSort(3)">Toplam İade</th><th data-c="4" onclick="tSort(4)">Net Sevk</th><th data-c="5" onclick="tSort(5)">Başarı</th><th>Trend</th>'
    +'</tr></thead><tbody id="tBody"></tbody></table></div>';
}

window.doFilterTable=function(){
  var q=(document.getElementById('tSrch')?document.getElementById('tSrch').value:'').toLowerCase();
  var yf=document.getElementById('tYr')?document.getElementById('tYr').value:'all';
  var rows=[];
  Object.entries(D.mags).forEach(function(e){
    var name=e[0],d=e[1];
    if(q&&name.toLowerCase().indexOf(q)<0)return;
    if(yf==='all'){
      var yrs=Object.keys(d.y).map(Number).sort();
      var nv=yrs.map(function(yr){return d.y[yr].n});
      rows.push([name,d.ts||0,d.ti||0,d.tn||0,d.bo||0,nv]);
    }else{
      var yd=d.y[yf];
      if(yd)rows.push([name,yd.s||0,yd.i||0,yd.n||0,yd.b||0,null]);
    }
  });
  rows.sort(function(a,b){
    var va=a[tCol],vb=b[tCol];
    if(typeof va==='string')return tDir==='asc'?va.localeCompare(vb,'tr'):vb.localeCompare(va,'tr');
    return tDir==='asc'?va-vb:vb-va;
  });
  if(document.getElementById('tCnt'))document.getElementById('tCnt').textContent=rows.length+' kayıt';
  var body=document.getElementById('tBody');
  if(!body)return;
  body.innerHTML=rows.map(function(r,idx){
    var bas=typeof r[4]==='number'&&isFinite(r[4])?r[4]:0;
    var bw=Math.max(0,Math.min(bas*100,100));
    var bcl=bclr(bas);
    var spk=r[5]?spark(r[5],65,20,C[idx%C.length]):'';
    return'<tr><td style="color:var(--dim);font-size:.7rem">'+(idx+1)+'</td>'
      +'<td><span style="font-weight:600;cursor:pointer;transition:.2s" onmouseover="this.style.color=\'var(--accent)\'" onmouseout="this.style.color=\'\'" onclick="curTab=\'magazines\';renderNav();renderPage();requestAnimationFrame(function(){showMag(\''+esc(r[0])+'\')})">'+r[0]+'</span></td>'
      +'<td>'+ff(r[1])+'</td>'
      +'<td style="color:var(--accent5)">'+ff(r[2])+'</td>'
      +'<td style="color:var(--accent);font-weight:600">'+ff(r[3])+'</td>'
      +'<td><div style="display:flex;align-items:center;gap:.35rem"><div class="pb"><div class="pf" style="width:'+bw+'%;background:'+bcl+'"></div></div><span class="bd '+bc(bas)+'">'+pct(bas)+'</span></div></td>'
      +'<td>'+spk+'</td></tr>';
  }).join('');
};

window.tSort=function(col){
  if(tCol===col)tDir=tDir==='asc'?'desc':'asc';
  else{tCol=col;tDir=col<=1?'asc':'desc'}
  doFilterTable();
};

window.exportCSV=function(){
  var yf=document.getElementById('tYr')?document.getElementById('tYr').value:'all';
  var csv='\uFEFFDergi;Toplam Sevk;Toplam İade;Net Sevk;Başarı Oranı\n';
  Object.entries(D.mags).forEach(function(e){
    var name=e[0],d=e[1];
    if(yf==='all'){csv+=name+';'+Math.round(d.ts||0)+';'+Math.round(d.ti||0)+';'+Math.round(d.tn||0)+';'+pct(d.bo)+'\n'}
    else{var yd=d.y[yf];if(yd)csv+=name+';'+Math.round(yd.s||0)+';'+Math.round(yd.i||0)+';'+Math.round(yd.n||0)+';'+pct(yd.b)+'\n'}
  });
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='dergi_'+yf+'.csv';a.click();
};

// ── INIT ──
renderNav();
renderPage();
</script>
